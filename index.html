<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
   max-width: 500px;
  margin: auto;
  margin: auto;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom, #ffe6f0, #fff);
  text-align: center;
  overflow-x: hidden;
}

h1 {
  font-family: 'Great Vibes', cursive;
  color: #ff4d88;
  margin-top: 20px;
  margin-bottom: 10px;
}

/* Button */
button {
  background: #ff4d88;
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 20px;
}

.container {
    padding: 20px 10px;
}

.hidden { display: none; }

/* Slideshow */
.slideshow {
  position: relative;
  max-width: 90%;
  margin: auto;
}

.slide {
  display: none;
}

.slide img {
   width: 100%;
  max-width: 350px;
  height: auto;
  border-radius: 20px;
  margin: 10px auto;
  display: block;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

/* Typing text */
#typing {
  font-size: 18px;
  white-space: pre-line;
  min-height: 100px;
}

/* Hearts */
.heart {
  position: fixed;
  color: pink;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}
@keyframes floatUp {
  0% {transform: translateY(100vh); opacity: 1;}
  100% {transform: translateY(-10vh); opacity: 0;}
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="Birthday.mp3" type="audio/mpeg">
</audio>

<!-- Start -->
<div class="container" id="start">
  <h1>Hey You 💕</h1>
  <p>A little surprise for you...</p>
  <button onclick="startSurprise()">Tap to Open 🎁</button>
</div>

<!-- Main -->
<div id="main" class="hidden">

  <div class="container">
    <h1>Happy Birthday 🎉</h1>
  </div>

  <!-- SLIDESHOW -->
  <div class="container">
    <h2></h2>

    <div class="slideshow">
      <div class="slide"><img src="photo1.jpeg"></div>
      <div class="slide"><img src="photo2.jpeg"></div>
      <div class="slide"><img src="photo3.jpeg"></div>
    </div>

  </div>

  <!-- TYPING MESSAGE -->
  <div class="container">
    <h2>For You 💌</h2>
    <p id="typing"></p>
  </div>

</div>

<script>
let slideIndex = 0;

/* Start everything */
function startSurprise() {
  document.getElementById("start").style.display = "none";
  document.getElementById("main").classList.remove("hidden");

  document.getElementById("music").play(); // music start
  showSlides();
  typeMessage();
  createHearts();
}

/* Slideshow */
function showSlides() {
  let slides = document.getElementsByClassName("slide");
  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }
  slideIndex++;
  if (slideIndex > slides.length) { slideIndex = 1; }
  slides[slideIndex-1].style.display = "block";
  setTimeout(showSlides, 2500);
}

/* Typing animation */
const message = `You are one of the most special people in my life ❤️

Thank you for every laugh, every memory, and every moment.

I’m really lucky to have you.

Happy Birthday Bestie 🎉💕`;

let i = 0;
function typeMessage() {
  if (i < message.length) {
    document.getElementById("typing").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeMessage, 40);
  }
}

/* Floating hearts */
function createHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 300);
}
</script>

</body>
</html>
